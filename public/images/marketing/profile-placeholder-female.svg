<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="femaleBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3e8ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hijabGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dressFemale" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b21b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="url(#femaleBg)" rx="12"/>

  <!-- Subtle pattern -->
  <g opacity="0.06" stroke="#a855f7" stroke-width="0.8" fill="none">
    <line x1="0" y1="50" x2="300" y2="50"/>
    <line x1="0" y1="100" x2="300" y2="100"/>
    <line x1="0" y1="150" x2="300" y2="150"/>
    <line x1="0" y1="200" x2="300" y2="200"/>
    <line x1="0" y1="250" x2="300" y2="250"/>
    <line x1="0" y1="300" x2="300" y2="300"/>
    <line x1="0" y1="350" x2="300" y2="350"/>
  </g>

  <!-- Small hearts top -->
  <g fill="#fbbf24" opacity="0.35">
    <path d="M 150 25 C 150 19 144 13 138 19 C 132 13 126 19 126 25 C 126 37 150 45 150 45 C 150 45 174 37 174 25 C 174 19 168 13 162 19 C 156 13 150 19 150 25 Z" transform="scale(0.5) translate(150, 10)"/>
  </g>

  <!-- Hijab (outer wrap — full head coverage) -->
  <!-- Back/sides of hijab -->
  <ellipse cx="150" cy="148" rx="72" ry="78" fill="url(#hijabGrad)" opacity="0.9"/>

  <!-- Hijab drape down sides -->
  <path d="M 78 148 Q 60 200 65 320 L 90 320 Q 88 200 95 148 Z" fill="#4c1d95" opacity="0.85"/>
  <path d="M 222 148 Q 240 200 235 320 L 210 320 Q 212 200 205 148 Z" fill="#4c1d95" opacity="0.85"/>

  <!-- Face oval -->
  <ellipse cx="150" cy="155" rx="38" ry="44" fill="#d97706" opacity="0.55"/>

  <!-- Face color (skin tone) -->
  <ellipse cx="150" cy="158" rx="35" ry="40" fill="#fde68a" opacity="0.7"/>

  <!-- Hijab front edge framing face -->
  <path d="M 112 118 Q 112 108 150 105 Q 188 108 188 118 L 195 148 Q 195 155 188 158 L 112 158 Q 105 155 105 148 Z" fill="url(#hijabGrad)" opacity="0.88"/>

  <!-- Eyes -->
  <ellipse cx="137" cy="152" rx="5" ry="4" fill="#1e1b4b" opacity="0.8"/>
  <ellipse cx="163" cy="152" rx="5" ry="4" fill="#1e1b4b" opacity="0.8"/>
  <!-- Eye shine -->
  <circle cx="139" cy="150" r="1.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="165" cy="150" r="1.5" fill="#ffffff" opacity="0.7"/>

  <!-- Smile -->
  <path d="M 140 168 Q 150 176 160 168" fill="none" stroke="#78350f" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Body / abaya -->
  <path d="M 68 400 L 68 290 Q 68 240 150 230 Q 232 240 232 290 L 232 400 Z" fill="url(#dressFemale)" opacity="0.85"/>

  <!-- Hijab chest drape -->
  <path d="M 105 185 Q 150 210 195 185 L 210 260 Q 150 280 90 260 Z" fill="#4c1d95" opacity="0.7"/>

  <!-- Subtle gold trim on abaya -->
  <path d="M 88 400 L 88 295 Q 88 260 150 252" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.25"/>
  <path d="M 212 400 L 212 295 Q 212 260 150 252" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.25"/>

  <!-- Gold border accent -->
  <rect width="300" height="400" fill="none" stroke="#fbbf24" stroke-width="2" rx="12" opacity="0.3"/>
</svg>
