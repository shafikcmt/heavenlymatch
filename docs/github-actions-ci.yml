name: HeavenlyMatch CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ── 1. Code Quality & Type Safety ──────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: "${{ env.PNPM_VERSION }}" }

      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        working-directory: web
        run: pnpm tsc --noEmit

      - name: ESLint
        working-directory: web
        run: pnpm lint

      - name: Prettier check
        working-directory: web
        run: pnpm format:check

  # ── 2. Unit & Integration Tests ────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       heavenlymatch_test
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]

    env:
      DATABASE_URL:    postgresql://test_user:test_pass@localhost:5432/heavenlymatch_test
      REDIS_URL:       redis://localhost:6379
      JWT_ACCESS_SECRET:  test_access_secret_32chars_minimum
      JWT_REFRESH_SECRET: test_refresh_secret_32chars_minimum
      PHOTO_TOKEN_SECRET: test_photo_secret_32chars_minimum
      NODE_ENV:        test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: "${{ env.PNPM_VERSION }}" }

      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations (test DB)
        working-directory: web
        run: pnpm prisma migrate deploy

      - name: Seed test data
        working-directory: web
        run: pnpm prisma db seed

      - name: Run Vitest (unit + integration)
        working-directory: web
        run: pnpm test:ci

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          directory: web/coverage
          flags: unit

  # ── 3. E2E Tests ───────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: heavenlymatch_e2e
          POSTGRES_USER: e2e_user
          POSTGRES_PASSWORD: e2e_pass
        ports: ["5432:5432"]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: "${{ env.PNPM_VERSION }}" }

      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: pnpm

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: web
        run: pnpm playwright install --with-deps chromium

      - name: Build app
        working-directory: web
        run: pnpm build
        env:
          DATABASE_URL: postgresql://e2e_user:e2e_pass@localhost:5432/heavenlymatch_e2e

      - name: Run E2E tests
        working-directory: web
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/

  # ── 4. Security Scan ───────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run pnpm audit
        working-directory: web
        run: pnpm audit --audit-level=high

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: web
          severity: CRITICAL,HIGH

  # ── 5. Build & Deploy (Staging) ────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (Staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: web
          alias-domains: staging.heavenlymatch.com

      - name: Run DB migrations (staging)
        run: |
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Staging deploy ${{ job.status }} — ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

  # ── 6. Production Deploy ────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [e2e]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: web
          vercel-args: --prod

      - name: Run DB migrations (production)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG:        ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT:    heavenlymatch-web
        with:
          environment: production

      - name: Notify Slack (production)
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "🚀 Production deploy ${{ job.status }} — ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
