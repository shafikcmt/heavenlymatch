version: "3.9"

# =============================================================================
# HeavenlyMatch — Local Development Environment
# Run: docker compose up -d
# =============================================================================

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       heavenlymatch
      POSTGRES_USER:     hmuser
      POSTGRES_PASSWORD: hmpass_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hmuser -d heavenlymatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning --requirepass redis_dev_pass
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js App ─────────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: ./web/.env.local
    environment:
      DATABASE_URL:      postgresql://hmuser:hmpass_dev@postgres:5432/heavenlymatch
      REDIS_URL:         redis://:redis_dev_pass@redis:6379
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  # ── BullMQ Worker (background jobs) ─────────────────────────────────────────
  worker:
    build:
      context: ./web
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: ./web/.env.local
    environment:
      DATABASE_URL: postgresql://hmuser:hmpass_dev@postgres:5432/heavenlymatch
      REDIS_URL:    redis://:redis_dev_pass@redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  # ── Bull Board (queue UI) ────────────────────────────────────────────────────
  bull-board:
    image: deadly0/bull-board
    restart: unless-stopped
    environment:
      REDIS_HOST:     redis
      REDIS_PORT:     "6379"
      REDIS_PASSWORD: redis_dev_pass
    ports:
      - "3001:3000"
    depends_on:
      - redis

  # ── MinIO (local S3 replacement) ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minio_dev
      MINIO_ROOT_PASSWORD: minio_dev_pass
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Mailpit (local email testing) ───────────────────────────────────────────
  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres_data:
  redis_data:
  minio_data:
